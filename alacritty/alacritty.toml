[general]
import = ["./themes/themes/ashes_dark.toml"]

[colors.primary]
background = "#14181c"

[window]
decorations = "None"
startup_mode = "Maximized"
option_as_alt = "Both"
dynamic_padding = true

[scrolling]
multiplier = 5

[[hints.enabled]]
regex = "(?:[~./][\\w./@-]+|/[\\w./@-]+|(?-u:\\b)[\\w./@-]+\\.[a-zA-Z]\\w*)(?::\\d+(?::\\d+)?)?"
command = { program = "/bin/sh", args = ["-c", "exec \"$HOME/.config/alacritty/bin/alacritty-open-path\" \"$@\"", "sh"] }
post_processing = true
mouse = { enabled = true, mods = "Shift" }
binding = { key = "O", mods = "Control|Shift" }

[font]
size = 14

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[keyboard]
bindings = [
  { key = "Left",  mods = "Option", chars = "\u001bb" },
  { key = "Right", mods = "Option", chars = "\u001bf" },
  { key = "Left",  mods = "Command", chars = "\u0001" },
  { key = "Right", mods = "Command", chars = "\u0005" },
  { key = "Backspace", mods = "Option", chars = "\u001b\u007f" },
  { key = "Backspace", mods = "Command", chars = "\u0015" },
  { key = "L", mods = "Command", chars = "\u000c" },
  { key = "Return", mods = "Shift", chars = "\u001b\r" }
]

